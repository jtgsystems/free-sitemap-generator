name: CI

on:
  push:
    branches: [ main, master, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [ main, master ]
    paths-ignore:
      - '**.md'
      - 'docs/**'

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13']

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip dependencies
      uses: actions/cache@v5
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt', '**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pylint black isort mypy pytest pytest-asyncio pytest-aiohttp pytest-cov
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
        pip install -e .
      shell: bash

    - name: Lint with flake8
      run: |
        flake8 sitemap_generator/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 sitemap_generator/ --count --exit-zero --max-complexity=12 --max-line-length=100 --statistics

    - name: Check formatting with black
      run: |
        black --check sitemap_generator/ --line-length 100 || true

    - name: Type check with mypy
      run: |
        mypy sitemap_generator/ --ignore-missing-imports || true

    - name: Run unit tests
      run: |
        pytest tests/ -v --cov=sitemap_generator --cov-report=xml --cov-report=term-missing -x || true

    - name: Test CLI functionality
      run: |
        python -m sitemap_generator --help
        python -m sitemap_generator --version

    - name: Upload coverage
      uses: codecov/codecov-action@v5
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      with:
        file: ./coverage.xml
        fail_ci_if_error: false

  integration-test:
    runs-on: ubuntu-latest
    needs: test
    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .

    - name: Test with example.com
      run: |
        timeout 30 python -m sitemap_generator https://example.com --max-depth 1 --output-format xml --output test_sitemap.xml || true
        if [ -f test_sitemap.xml ]; then echo "✓ Sitemap generated successfully"; cat test_sitemap.xml; fi

  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install security tools
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety
        pip install -e .

    - name: Run bandit
      run: |
        bandit -r sitemap_generator/ -ll || true

    - name: Check dependencies
      run: |
        if [ -f requirements.txt ]; then safety check -r requirements.txt || true; fi

  build:
    runs-on: ubuntu-latest
    needs: [test, security]
    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install build tools
      run: |
        python -m pip install --upgrade pip
        pip install build twine

    - name: Build package
      run: |
        python -m build

    - name: Check package
      run: |
        twine check dist/*

    - name: Upload artifacts
      uses: actions/upload-artifact@v6
      with:
        name: dist
        path: dist/
